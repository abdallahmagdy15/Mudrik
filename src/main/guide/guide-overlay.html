<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      background: transparent;
      overflow: hidden;
      pointer-events: none;
      user-select: none;
      -webkit-app-region: no-drag;
    }
    .owl {
      position: absolute;
      width: 140px;
      height: 140px;
      background: url('owl-wing-pointer.png') no-repeat center / contain;
      filter: drop-shadow(0 4px 12px rgba(0, 0, 0, 0.35));
      transition: left 600ms cubic-bezier(0.22, 1, 0.36, 1),
                  top 600ms cubic-bezier(0.22, 1, 0.36, 1),
                  opacity 250ms ease;
      opacity: 0;
      pointer-events: none;
    }
    .owl.visible { opacity: 1; }
    .owl.bob { animation: bob 1.4s ease-in-out infinite; }
    @keyframes bob {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-8px); }
    }
    .circle {
      position: absolute;
      border-radius: 50%;
      background: rgba(15, 168, 201, 0.22);  /* PRIMARY teal at ~22% */
      border: 2px solid rgba(15, 168, 201, 0.55);
      box-shadow: 0 0 24px rgba(15, 168, 201, 0.35);
      transition: left 300ms ease, top 300ms ease,
                  width 300ms ease, height 300ms ease,
                  opacity 300ms ease;
      opacity: 0;
      pointer-events: none;
    }
    .circle.visible { opacity: 1; }
  </style>
</head>
<body>
  <div id="circle" class="circle"></div>
  <div id="owl" class="owl"></div>
  <script src="./guide-overlay-renderer.js"></script>
</body>
</html>
