<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      background: transparent;
      overflow: hidden;
      pointer-events: none;
      user-select: none;
      -webkit-app-region: no-drag;
    }
    .owl {
      position: absolute;
      width: 64px;
      height: 64px;
      background: url('owl-wing-pointer.png') no-repeat center / contain;
      filter: drop-shadow(0 2px 6px rgba(0, 0, 0, 0.4));
      transition: left 500ms cubic-bezier(0.22, 1, 0.36, 1),
                  top 500ms cubic-bezier(0.22, 1, 0.36, 1),
                  opacity 200ms ease;
      opacity: 0;
      pointer-events: none;
    }
    .owl.visible { opacity: 1; }
    .owl.bob { animation: bob 1.4s ease-in-out infinite; }
    @keyframes bob {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-4px); }
    }
    .circle {
      position: absolute;
      border-radius: 50%;
      background: rgba(15, 168, 201, 0.18);
      border: 2px solid rgba(15, 168, 201, 0.7);
      box-shadow: 0 0 12px rgba(15, 168, 201, 0.45);
      transition: left 250ms ease, top 250ms ease,
                  width 250ms ease, height 250ms ease,
                  opacity 200ms ease;
      opacity: 0;
      pointer-events: none;
    }
    .circle.visible { opacity: 1; }
  </style>
</head>
<body>
  <div id="circle" class="circle"></div>
  <div id="owl" class="owl"></div>
  <script src="./guide-overlay-renderer.js"></script>
</body>
</html>
