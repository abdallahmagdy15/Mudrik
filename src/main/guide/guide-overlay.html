<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      background: transparent;
      overflow: hidden;
      pointer-events: none;
      user-select: none;
      -webkit-app-region: no-drag;
    }
    .owl {
      position: absolute;
      width: 64px;
      height: 64px;
      background: url('owl-wing-pointer.png') no-repeat center / contain;
      filter: drop-shadow(0 2px 6px rgba(0, 0, 0, 0.4));
      transition: left 500ms cubic-bezier(0.22, 1, 0.36, 1),
                  top 500ms cubic-bezier(0.22, 1, 0.36, 1),
                  opacity 200ms ease;
      opacity: 0;
      pointer-events: none;
    }
    .owl.visible { opacity: 1; }
    .owl.bob { animation: bob 1.4s ease-in-out infinite; }
    @keyframes bob {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-4px); }
    }
    .loading {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      pointer-events: none;
      user-select: none;
    }
    .loading.active { display: block; }
    .loading-ring {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(24, 191, 225, 0.2);
      border-top-color: #18BFE1;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 10px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .loading-text {
      color: #18BFE1;
      font-family: -apple-system, Segoe UI, system-ui, sans-serif;
      font-size: 14px;
      font-weight: 500;
      text-shadow: 0 1px 4px rgba(0,0,0,0.5);
    }
  </style>
</head>
<body>
  <div id="owl" class="owl"></div>
  <div id="loading" class="loading">
    <div class="loading-ring"></div>
    <div class="loading-text">Scanning screen…</div>
  </div>
  <script src="./guide-overlay-renderer.js"></script>
</body>
</html>
