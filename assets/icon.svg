<?xml version="1.0" encoding="UTF-8"?>
<!--
  Mudrik tray / installer icon. Static version of the blue owl mascot.
  Colors and geometry match src/renderer/components/OwlMascot.tsx so the
  tray icon and the in-panel animated mascot read as the same character.
  Kept simple (flat vector, no gradients) so it renders crisply at 16/32px.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none">
  <!-- Soft cast shadow -->
  <ellipse cx="128" cy="246" rx="70" ry="4.5" fill="#2D4A63" opacity="0.18"/>

  <!-- Feet -->
  <g fill="#F2A93A" stroke="#2D4A63" stroke-width="2" stroke-linejoin="round">
    <path d="M 100 234 Q 102 244 108 244 L 114 244 Q 118 244 116 238 Z"/>
    <path d="M 118 234 Q 120 245 126 245 L 132 245 Q 136 244 134 238 Z"/>
    <path d="M 138 234 Q 140 245 146 245 L 152 245 Q 156 244 154 238 Z"/>
  </g>

  <!-- Body -->
  <path fill="#7499C2" stroke="#2D4A63" stroke-width="4" stroke-linejoin="round"
    d="M 128 86 C 74 86, 40 128, 40 172 C 40 218, 80 238, 128 238 C 176 238, 216 218, 216 172 C 216 128, 182 86, 128 86 Z"/>

  <!-- Left wing -->
  <path fill="#4F7399" stroke="#2D4A63" stroke-width="3" stroke-linejoin="round"
    d="M 52 148 C 40 180, 48 214, 74 226 L 92 222 L 88 150 Z"/>
  <path fill="#7499C2" opacity="0.85"
    d="M 60 158 C 52 184, 58 210, 78 220 L 86 218 L 84 162 Z"/>
  <g stroke="#2D4A63" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.7">
    <path d="M 74 172 Q 70 192 78 210"/>
    <path d="M 64 166 Q 60 190 72 214"/>
  </g>

  <!-- Right wing -->
  <path fill="#4F7399" stroke="#2D4A63" stroke-width="3" stroke-linejoin="round"
    d="M 204 148 C 216 180, 208 214, 182 226 L 164 222 L 168 150 Z"/>
  <path fill="#7499C2" opacity="0.85"
    d="M 196 158 C 204 184, 198 210, 178 220 L 170 218 L 172 162 Z"/>
  <g stroke="#2D4A63" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.7">
    <path d="M 182 172 Q 186 192 178 210"/>
    <path d="M 192 166 Q 196 190 184 214"/>
  </g>

  <!-- Belly -->
  <ellipse cx="128" cy="186" rx="46" ry="50" fill="#E8EEF5" stroke="#2D4A63" stroke-width="2"/>
  <ellipse cx="128" cy="212" rx="38" ry="18" fill="#C9D5E4" opacity="0.55"/>
  <!-- Chest ruffle + smile -->
  <path d="M 116 158 Q 128 170 140 158" fill="none" stroke="#7499C2" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 116 198 Q 128 208 140 198" fill="none" stroke="#4F7399" stroke-width="2.2" stroke-linecap="round" opacity="0.6"/>

  <!-- Head with curved (cat/owl-style) ear tufts that bulge outward,
       not thin pointy goat horns. -->
  <path fill="#7499C2" stroke="#2D4A63" stroke-width="4" stroke-linejoin="round" stroke-linecap="round"
    d="M 54 108
       C 54 80, 66 60, 82 50
       C 72 40, 66 28, 72 20
       C 82 26, 92 38, 100 46
       C 110 40, 118 36, 128 36
       C 138 36, 146 40, 156 46
       C 164 38, 174 26, 184 20
       C 190 28, 184 40, 174 50
       C 190 60, 202 80, 202 108
       L 54 108 Z"/>

  <!-- Head highlight sheen -->
  <path d="M 76 54 C 92 46, 108 42, 122 42" fill="none" stroke="#9DB8D6" stroke-width="5" stroke-linecap="round" opacity="0.6"/>

  <!-- Eye whites — BIG face container (matches OwlMascot r=30) -->
  <circle cx="100" cy="94" r="30" fill="#FFFFFF" stroke="#2D4A63" stroke-width="3"/>
  <circle cx="156" cy="94" r="30" fill="#FFFFFF" stroke="#2D4A63" stroke-width="3"/>

  <!-- Inner eyeball (smaller than the white so there's visible sclera) -->
  <circle cx="100" cy="94" r="18" fill="#D99A1E"/>
  <circle cx="156" cy="94" r="18" fill="#D99A1E"/>
  <circle cx="100" cy="94" r="15" fill="#F2C94C"/>
  <circle cx="156" cy="94" r="15" fill="#F2C94C"/>

  <!-- Pupils -->
  <circle cx="100" cy="94" r="8" fill="#1C1C1C"/>
  <circle cx="156" cy="94" r="8" fill="#1C1C1C"/>

  <!-- Sparkles -->
  <circle cx="103" cy="90" r="3" fill="#FFFFFF"/>
  <circle cx="159" cy="90" r="3" fill="#FFFFFF"/>
  <circle cx="96"  cy="99" r="1.4" fill="#FFFFFF"/>
  <circle cx="152" cy="99" r="1.4" fill="#FFFFFF"/>

  <!-- Beak -->
  <path fill="#F2A93A" stroke="#2D4A63" stroke-width="2.5" stroke-linejoin="round"
    d="M 128 120 L 118 134 Q 128 140 138 134 Z"/>
  <path d="M 123 124 L 126 130" fill="none" stroke="#FFC06A" stroke-width="2" stroke-linecap="round" opacity="0.85"/>
</svg>
